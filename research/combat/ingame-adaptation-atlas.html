svg {

  height: auto;

#widget &gt; svg {

.text-warning,

      const available = new Set([&#x27;bond-4&#x27;,&#x27;command-4&#x27;,&#x27;sense-4&#x27;,&#x27;motion-3&#x27;,&#x27;guard-1&#x27;,&#x27;body-2&#x27;]);
      const knownIndexMax = 4;
      const nodeMap = new Map();

      function make(tag, attrs) {
        const element = document.createElementNS(ns, tag);
        Object.entries(attrs || {}).forEach(function (entry) {
          element.setAttribute(entry[0], entry[1]);
        });
        return element;
      }

      function statusFor(id, index) {
        if (learned.has(id)) return &#x27;learned&#x27;;
        if (available.has(id)) return &#x27;available&#x27;;
        if (index &lt;= knownIndexMax) return &#x27;known&#x27;;
        return &#x27;hidden&#x27;;
      }

      function line(layer, a, b, cls) {
        const item = make(&#x27;line&#x27;, {
          x1: a.x, y1: a.y, x2: b.x, y2: b.y, class: &#x27;edge &#x27; + cls
        });
        layer.appendChild(item);
        return item;
      }

      function setDetail(name, status, text, selected) {
        detailName.textContent = name;
        detailStatus.textContent = status;
        detailText.textContent = text;
        root.querySelectorAll(&#x27;.atlas-node.selected&#x27;).forEach(function (node) {
          node.classList.remove(&#x27;selected&#x27;);
        });
        if (selected) selected.classList.add(&#x27;selected&#x27;);
      }

      function addNode(layer, data) {
        const link = make(&#x27;a&#x27;, {
          href: &#x27;#atlas-node-detail&#x27;,
          class: &#x27;atlas-node &#x27; + data.status + (data.domain ? &#x27; domain-&#x27; + data.domain : &#x27;&#x27;),
          &#x27;aria-label&#x27;: data.displayName + &#x27;, &#x27; + data.status,

        let mark;
        if (data.status === &#x27;personal&#x27; || data.status === &#x27;forming&#x27;) {
          mark = make(&#x27;path&#x27;, { d: &#x27;M0 -9 L9 0 L0 9 L-9 0 Z&#x27;, class: &#x27;node-mark&#x27; });
        } else {
          mark = make(&#x27;circle&#x27;, { cx: 0, cy: 0, r: data.status === &#x27;hidden&#x27; ? 4 : 6.5, class: &#x27;node-mark&#x27; });

        group.appendChild(mark);
        group.appendChild(label);
        link.appendChild(group);
        link.addEventListener(&#x27;click&#x27;, function (event) {
          event.preventDefault();
          setDetail(data.fullName, data.statusLabel, data.detail, link);
        });
        layer.appendChild(link);
        return link;
      }

      domains.forEach(function (domain) {
        const halo = make(&#x27;ellipse&#x27;, {
          cx: domain.x, cy: domain.y, rx: 92, ry: 72,
          class: &#x27;domain-halo&#x27;, &#x27;data-domain&#x27;: domain.id
        });
        halosLayer.appendChild(halo);

        line(trunksLayer, { x: 575, y: 330 }, { x: domain.x, y: domain.y }, &#x27;trunk&#x27;);

        const option = document.createElement(&#x27;option&#x27;);
        option.value = domain.id;
        option.textContent = domain.name;
        select.appendChild(option);

        const domainText = make(&#x27;g&#x27;, {
          class: &#x27;domain-text&#x27;, &#x27;data-domain&#x27;: domain.id,
          transform: &#x27;translate(&#x27; + domain.x + &#x27; &#x27; + (domain.y - 86) + &#x27;)&#x27;
        });
        const label = make(&#x27;text&#x27;, { class: &#x27;domain-label&#x27;, &#x27;text-anchor&#x27;: &#x27;middle&#x27;, y: 0 });
        label.textContent = domain.name;
        const count = make(&#x27;text&#x27;, { class: &#x27;domain-count&#x27;, &#x27;text-anchor&#x27;: &#x27;middle&#x27;, y: 17 });
        count.textContent = &#x27;12 paths&#x27;;
        domainText.appendChild(label);
        domainText.appendChild(count);
        labelsLayer.appendChild(domainText);

        const local = [];
        domain.names.forEach(function (name, index) {
          const id = domain.id + &#x27;-&#x27; + index;
          const pos = { x: domain.x + positions[index][0], y: domain.y + positions[index][1] };
          const status = statusFor(id, index);
          const displayName = status === &#x27;hidden&#x27; ? &#x27;?&#x27; : name;
          const statusLabel = status === &#x27;learned&#x27; ? &#x27;Learned standard path&#x27; :
            status === &#x27;available&#x27; ? &#x27;Reachable standard path&#x27; :
            status === &#x27;known&#x27; ? &#x27;Known standard path&#x27; : &#x27;Unseen path&#x27;;
          const detail = status === &#x27;hidden&#x27;
            ? &#x27;The atlas preserves the existence of further depth without revealing its spell, requirements, or behavior trigger.&#x27;
            : name + &#x27; belongs to the &#x27; + domain.name + &#x27; domain. It can connect to standard descendants and tested personal adaptations.&#x27;;
          const node = {
            id: id, x: pos.x, y: pos.y, status: status, displayName: displayName,
            fullName: status === &#x27;hidden&#x27; ? &#x27;Unknown &#x27; + domain.name + &#x27; path&#x27; : name,
            statusLabel: statusLabel, detail: detail, domain: domain.id,
            labelSide: positions[index][0] &lt; 0 ? &#x27;left&#x27; : &#x27;right&#x27;
          };
          local.push(node);
          nodeMap.set(id, node);
          addNode(nodesLayer, node);
        });

        edgePairs.forEach(function (pair) {
          const from = local[pair[0]];
          const to = local[pair[1]];
          const pathEdge = learned.has(from.id) &amp;&amp; learned.has(to.id);
          line(edgesLayer, from, to, pathEdge ? &#x27;path&#x27; : &#x27;&#x27;);
        });
      });

      const personals = [
        {
          id: &#x27;shared-sight&#x27;, x: 520, y: 205, status: &#x27;personal&#x27;,
          displayName: &#x27;Shared Sight&#x27;, fullName: &#x27;Shared Sight&#x27;,
          statusLabel: &#x27;Learned personal adaptation&#x27;,
          detail: &#x27;Created from repeated use of a familiar as a remote observer. It bridges Bond and Sense without creating a separate class tree.&#x27;,
          labelSide: &#x27;right&#x27;, parents: [&#x27;bond-0&#x27;,&#x27;sense-1&#x27;]
        },
        {
          id: &#x27;black-wing-order&#x27;, x: 390, y: 250, status: &#x27;personal&#x27;,
          displayName: &#x27;Black Wing Order&#x27;, fullName: &#x27;Black Wing Order&#x27;,
          statusLabel: &#x27;Learned personal adaptation&#x27;,
          detail: &#x27;Created from coordinated aerial attacks. It bridges Bond and Command and contributes to the Crow Master shape.&#x27;,
          labelSide: &#x27;left&#x27;, parents: [&#x27;bond-5&#x27;,&#x27;command-2&#x27;]
        },
        {
          id: &#x27;flock-step&#x27;, x: 690, y: 245, status: &#x27;forming&#x27;,
          displayName: &#x27;Flock Step ?&#x27;, fullName: &#x27;Flock Step&#x27;,
          statusLabel: &#x27;Adaptation forming&#x27;,
          detail: &#x27;The outline is visible because the player is repeatedly combining familiar movement with personal repositioning. The exact offer remains unconfirmed.&#x27;,
          labelSide: &#x27;right&#x27;, parents: [&#x27;shared-sight&#x27;,&#x27;motion-1&#x27;]
        }
      ];
      const personalMap = new Map();
      personals.forEach(function (item) { personalMap.set(item.id, item); });

      personals.forEach(function (item) {
        item.parents.forEach(function (parentId) {
          const parent = nodeMap.get(parentId) || personalMap.get(parentId);
          if (parent) line(classLayer, parent, item, &#x27;personal&#x27;);
        });
      });
      const classPolygon = make(&#x27;path&#x27;, {
        d: &#x27;M370 270 Q440 170 530 185 Q635 185 710 260 Q575 315 370 270 Z&#x27;,
        class: &#x27;class-shape&#x27;
      });
      classLayer.insertBefore(classPolygon, classLayer.firstChild);
      const classText = make(&#x27;text&#x27;, { x: 535, y: 296, class: &#x27;class-label&#x27;, &#x27;text-anchor&#x27;: &#x27;middle&#x27; });
      classText.textContent = &#x27;CROW MASTER SHAPE&#x27;;
      classLayer.appendChild(classText);
      personals.forEach(function (item) { addNode(personalLayer, item); });

      const rootOuter = make(&#x27;circle&#x27;, { cx: 575, cy: 330, r: 28, class: &#x27;root-ring&#x27; });
      const rootInner = make(&#x27;circle&#x27;, { cx: 575, cy: 330, r: 8, class: &#x27;root-core&#x27; });
      const rootText = make(&#x27;text&#x27;, { x: 575, y: 373, class: &#x27;root-label&#x27; });
      rootText.textContent = &#x27;SPELLCRAFT&#x27;;
      rootLayer.appendChild(rootOuter);
      rootLayer.appendChild(rootInner);
      rootLayer.appendChild(rootText);

      const counts = { learned: 0, available: 0, hidden: 0 };
      domains.forEach(function (domain) {
        domain.names.forEach(function (_, index) {
          const status = statusFor(domain.id + &#x27;-&#x27; + index, index);
          if (status === &#x27;learned&#x27;) counts.learned += 1;
          if (status === &#x27;available&#x27;) counts.available += 1;
          if (status === &#x27;hidden&#x27;) counts.hidden += 1;
        });
      });
      root.querySelector(&#x27;#atlas-learned-count&#x27;).textContent = counts.learned;
      root.querySelector(&#x27;#atlas-reachable-count&#x27;).textContent = counts.available;
      root.querySelector(&#x27;#atlas-personal-count&#x27;).textContent = personals.length;
      root.querySelector(&#x27;#atlas-hidden-count&#x27;).textContent = counts.hidden;

      let currentView = [0, 0, 1200, 650];
      function animateView(next) {
        const reduce = window.matchMedia &amp;&amp; window.matchMedia(&#x27;(prefers-reduced-motion: reduce)&#x27;).matches;
        const start = currentView.slice();
        const duration = reduce ? 0 : 260;
        const started = performance.now();
        function frame(now) {
          const raw = duration === 0 ? 1 : Math.min(1, (now - started) / duration);
          const t = 1 - Math.pow(1 - raw, 3);
          const value = start.map(function (item, index) {
            return item + (next[index] - item) * t;
          });
          svg.setAttribute(&#x27;viewBox&#x27;, value.join(&#x27; &#x27;));
          if (raw &lt; 1) requestAnimationFrame(frame);
          else currentView = next.slice();
        }
        requestAnimationFrame(frame);
      }

      function focusDomain(id) {
        root.dataset.focus = id;
        root.querySelectorAll(&#x27;.is-focused&#x27;).forEach(function (item) {
          item.classList.remove(&#x27;is-focused&#x27;);
        });
        if (id === &#x27;all&#x27;) {
          animateView([0, 0, 1200, 650]);
          setDetail(&#x27;Spellcraft&#x27;, &#x27;Whole atlas&#x27;, &#x27;One hundred and twenty standard paths remain organized as ten readable domains. Personal adaptations bridge domains instead of expanding one endless vertical tree.&#x27;);
          return;
        }
        const domain = domains.find(function (item) { return item.id === id; });
        root.querySelectorAll(&#x27;[data-domain=&quot;&#x27; + id + &#x27;&quot;]&#x27;).forEach(function (item) {
          item.classList.add(&#x27;is-focused&#x27;);
        });
        const left = Math.max(0, domain.x - 145);
        const top = Math.max(0, domain.y - 120);
        animateView([left, top, 290, 240]);
        setDetail(domain.name, &#x27;Domain focus&#x27;, &#x27;This local view exposes readable names and links. The rest of the atlas remains present but visually suppressed.&#x27;);
      }

      select.addEventListener(&#x27;change&#x27;, function () {
        focusDomain(select.value);
      });
    })();
  &lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
